<div class="publicaciones-container container-fluid py-5">
    <div class="container">

        @if (errorMessage()) {
            <div class="alert alert-danger alert-dismissible fade show text-center py-2 mb-3" role="alert">
                <small class="fw-medium">{{ errorMessage() }}</small>
            </div>
        }

        <div class="row mb-5 align-items-end justify-content-between header-box p-4 rounded ">
            <div class="col-12 col-md-5">
                <h1 class="fw-bold title-branding">Publicaciones</h1>
            </div>
            <div class="col-12 col-md-5 d-flex justify-content-md-end gap-2 align-items-center">
                <span class="orden me-2 text-secondary fw-semibold">Ordenar por:</span>
                <button (click)="cambiarOrden('createdAt')" class="btn filter-btn transition-all" [ngClass]="{'active': ordenActual === 'createdAt'}">
                    Recientes
                </button>
                <button (click)="cambiarOrden('likes')" class="btn filter-btn transition-all" [ngClass]="{'active': ordenActual === 'likes'}">
                    Populares
                </button>
            </div>
        </div>

        <div class="row justify-content-center">
            
            <div class="col-12 col-lg-8">
                @for (pub of publicaciones(); track pub._id) {

                    <app-publicacion-card
                        [publicacion]="pub"
                        [idUsuarioLogueado]="usuarioId"
                        (onLike)="handleLike($event)"
                        (onDelete)="handleDelete($event)">
                    </app-publicacion-card>

                } @empty {
                    <div class="text-center p-5 rounded bg-white shadow-sm mb-4">
                        <p class="text-muted fs-5 mb-0">No se encontraron publicaciones en esta sección</p>
                    </div>
                }

                <div class="d-flex justify-content-between align-items-center mt-5 pagination-box p-3 mb-4 rounded">
                    <button (click)="paginaAnterior()" [disabled]="offset === 0" class="btn btn-pagination transition-all">
                        Anterior
                    </button>

                    <span class="fw-bold info-page">Página {{ (offset / limite) + 1 }}</span>

                    <button (click)="paginaSiguiente()" [disabled]="offset + limite >= totalPublicaciones" class="btn btn-pagination transition-all">
                        Siguiente
                    </button>
                </div>

            </div>
        </div>

    </div>
</div>
